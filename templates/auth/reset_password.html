<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha — Consultório</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .card { max-width:420px; width:100%; }
  </style>
</head>
<body>
<div class="card animate-fade-in">
  <div class="card-header" style="background:linear-gradient(135deg,var(--success),#059669);padding:2rem;border-radius:var(--radius-lg) var(--radius-lg) 0 0;text-align:center">
    <div style="font-size:2.5rem">🔒</div>
    <h2 style="color:white;margin:.5rem 0 .25rem">Nova senha</h2>
    <p style="color:rgba(255,255,255,.85);margin:0">Defina uma nova senha segura</p>
  </div>
  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="alert alert-{{ cat if cat in ['success','danger','warning','info'] else 'info' }}">
      <span>{{ msg }}</span><button class="alert-close">✕</button>
    </div>
    {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group" style="margin-bottom:1.25rem">
        <label class="form-label">Nova senha</label>
        <div style="position:relative">
          <input type="password" name="password" class="form-control"
                 placeholder="Mínimo 8 caracteres" required minlength="8" id="np">
          <button type="button" data-toggle-password="np"
                  style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted)">👁</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repita a senha" required>
      </div>
      <button type="submit" class="btn btn-success w-full btn-lg" style="color:white">
        Redefinir senha
      </button>
    </form>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
