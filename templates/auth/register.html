<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Consultório</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .register-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    .register-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 2rem;
      text-align: center;
      color: white;
    }

    .register-header h2 { color: white; margin: .5rem 0 .25rem; }
    .register-header p  { color: rgba(255,255,255,.85); margin: 0; }

    .register-body { padding: 2rem; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="register-card animate-fade-in">
  <div class="register-header">
    <div style="font-size:2.5rem">🏥</div>
    <h2>Criar conta</h2>
    <p>Preencha os dados para se cadastrar no sistema</p>
  </div>

  <div class="register-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat if cat in ['success','danger','warning','info'] else 'info' }}">
        <span>{{ msg }}</span><button class="alert-close">✕</button>
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-grid">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label" for="name">Nome completo <span class="required">*</span></label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Seu nome completo" required minlength="3">
        </div>

        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label" for="email">E-mail <span class="required">*</span></label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="seu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Telefone</label>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="(11) 99999-9999" data-mask="phone">
        </div>

        <div class="form-group">
          <label class="form-label" for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" class="form-control"
                 placeholder="000.000.000-00" data-mask="cpf" maxlength="14">
        </div>

        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label" for="birth_date">Data de nascimento</label>
          <input type="date" id="birth_date" name="birth_date" class="form-control">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha <span class="required">*</span></label>
          <div style="position:relative">
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Mínimo 8 caracteres" required minlength="8">
            <button type="button" data-toggle-password="password"
                    style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted)">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirmar senha <span class="required">*</span></label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="Repita a senha" required>
        </div>
      </div>

      <div style="margin-top:1.5rem">
        <button type="submit" class="btn btn-primary w-full btn-lg">
          Criar conta
        </button>
      </div>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-secondary)">
      Já tem conta?
      <a href="{{ url_for('auth.login') }}" style="color:var(--primary);font-weight:600">Faça login</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
