<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha — {{ branding.company_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .card { max-width:420px; width:100%; }
    .card-header-hero {
      background: linear-gradient(135deg, var(--warning), #D97706);
      padding: 2rem;
      text-align: center;
      color: white;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .card-header-hero h2 { color:white; margin:.5rem 0 .25rem; }
    .card-header-hero p  { color:rgba(255,255,255,.85); margin:0; }
  </style>
</head>
<body>
<div class="card animate-fade-in">
  <div class="card-header-hero">
    <div style="font-size:2.5rem">🔑</div>
    <h2>Recuperar senha</h2>
    <p>Informe seu e-mail para receber as instruções</p>
  </div>
  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat if cat in ['success','danger','warning','info'] else 'info' }}">
        <span>{{ msg }}</span><button class="alert-close">✕</button>
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label" for="email">E-mail cadastrado</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="seu@email.com" required autofocus>
        <span class="form-hint">Enviaremos um link de recuperação para este e-mail.</span>
      </div>
      <button type="submit" class="btn btn-warning w-full btn-lg" style="color:white">
        Enviar instruções
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:.875rem">
      <a href="{{ url_for('auth.login') }}" style="color:var(--primary)">← Voltar ao login</a>
    </div>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
