<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro interno — Consultório</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:2rem; }
    .error-page { text-align:center; max-width:480px; }
    .error-code { font-size:6rem; font-weight:800; color:var(--danger); line-height:1; margin-bottom:.5rem; }
  </style>
</head>
<body>
<div class="error-page animate-fade-in">
  <div style="font-size:5rem;margin-bottom:1rem">⚠️</div>
  <div class="error-code">500</div>
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.75rem">Erro interno do servidor</h1>
  <p style="color:var(--text-secondary);margin-bottom:2rem">
    Algo deu errado no servidor. Nossa equipe foi notificada. Por favor, tente novamente em alguns instantes.
  </p>
  <div class="d-flex gap-3 justify-center">
    <button onclick="location.reload()" class="btn btn-outline-secondary">↻ Tentar novamente</button>
    <a href="/" class="btn btn-primary">🏠 Ir para o início</a>
  </div>
</div>
</body>
</html>
